{# By default the anchor_type is the same as the obj_type,
   eg 'user.unfollow' will anchor to '#user-info' #}
{% set anchor_type = anchor_type or obj_type %}
{% if following or am_following %}
  <a class="{% block following_class %}btn btn-danger{% endblock %}" hx-post="{{ h.url_for(obj_type + '.unfollow', id=obj_id) }}" hx-target="#{{ anchor_type }}-info">
    <i class="fa-solid fa-circle-minus"></i>
    {{ _('Unfollow') }}
  </a>
{% else %}
  <a class="{% block unfollowing_class %}btn btn-success{% endblock %}" hx-post="{{ h.url_for(obj_type + '.follow', id=obj_id) }}" hx-target="#{{ anchor_type }}-info">
    <i class="fa-solid fa-circle-plus"></i>
    {{ _('Follow') }}
  </a>
{% endif %}
